<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#2563eb"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>

<title>肺癌診治指引 v3.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<style>
/* ═══ CSS VARIABLES — 亮色系（HCY 規範） ═══ */
:root{
  --bg:#f4f6fa; --bg2:#ffffff; --bg3:#eef1f7;
  --blue:#2563eb; --blue-l:#dbeafe; --blue-d:#1e40af;
  --text:#1a2340; --text2:#5a6a8a; --text3:#94a3b8;
  --green:#059669; --green-l:#d1fae5;
  --red:#dc2626;   --red-l:#fee2e2;
  --yellow:#ca8a04;--yellow-l:#fef3c7;
  --orange:#d97706;--orange-l:#ffedd5;
  --teal:#0d9488;  --teal-l:#ccfbf1;
  --violet:#7c3aed;--violet-l:#ede9fe;
  --pink:#db2777;  --pink-l:#fce7f3;
  --cyan:#0891b2;  --cyan-l:#cffafe;
  --rose:#e11d48;  --rose-l:#ffe4e6;
  --indigo:#4f46e5;--indigo-l:#e0e7ff;
  --border:#e2e8f0;--border2:#cbd5e1;
  --shadow:0 2px 8px rgba(30,64,175,.08);
  --shadow2:0 4px 16px rgba(30,64,175,.12);
  --radius:14px; --radius-sm:8px; --radius-lg:18px;
  --mono:'IBM Plex Mono',monospace;
  --sans:'Noto Sans TC',sans-serif;
}

/* ═══ RESET ═══ */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;min-width:0;}
html,body{margin:0;padding:0;overflow-x:hidden;max-width:100vw;background:var(--bg);
          font-family:var(--sans);color:var(--text);-webkit-font-smoothing:antialiased;
          font-size:16px;line-height:1.6;}
#root{width:100%;min-height:100vh;}
button{font-family:var(--sans);border:none;cursor:pointer;outline:none;background:none;padding:0;}
a{color:var(--blue);text-decoration:none;}
a:hover{text-decoration:underline;}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ═══ APP SHELL ═══ */
.app-wrap{width:100%;max-width:660px;margin:0 auto;min-height:100vh;background:var(--bg);}
.page-pad{padding:18px 18px 28px;}

/* ═══ HEADER ═══ */
.app-header{
  background:var(--blue-d);
  padding:14px 18px 12px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 12px rgba(30,64,175,.25);
}
.header-row1{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.header-title{font-size:19px;font-weight:700;color:#fff;letter-spacing:-.3px;flex:1;min-width:0;}
.header-badge{background:rgba(255,255,255,.18);color:#fff;font-size:13px;font-weight:700;
              padding:4px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0;
              border:1px solid rgba(255,255,255,.3);}
.header-row2{font-size:12px;color:rgba(255,255,255,.55);margin-top:3px;font-family:var(--mono);}
@media(max-width:430px){
  .header-title{font-size:17px;}
  .header-badge{font-size:12px;}
  .header-row2{display:none;}
}

/* ═══ BOTTOM TAB BAR ═══ */
.tab-bar{position:fixed;bottom:0;left:0;right:0;height:66px;
         background:var(--bg2);border-top:1.5px solid var(--border);
         display:flex;z-index:200;box-shadow:0 -3px 16px rgba(0,0,0,.08);}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;
         justify-content:center;gap:3px;position:relative;padding:6px 4px;}
.tab-indicator{position:absolute;top:0;left:50%;transform:translateX(-50%);
               width:32px;height:3px;border-radius:0 0 4px 4px;background:var(--blue);}
.tab-ico{font-size:22px;line-height:1;}
.tab-lbl{font-size:12px;font-weight:500;color:var(--text3);}
.tab-lbl.on{color:var(--blue);font-weight:800;}
.app-content{padding-bottom:74px;}
@media(max-width:430px){
  .tab-ico{font-size:20px;}.tab-lbl{font-size:11px;}.tab-bar{height:60px;}.app-content{padding-bottom:68px;}
}

/* ═══ PAGE TITLE ═══ */
.page-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:3px;letter-spacing:-.2px;}
.page-sub{font-size:13px;color:var(--text3);font-family:var(--mono);}

/* ═══ STEP BAR ═══ */
.stepbar{display:flex;align-items:center;gap:6px;overflow-x:auto;padding:6px 0 12px;
         scrollbar-width:none;margin-bottom:14px;-webkit-overflow-scrolling:touch;}
.stepbar::-webkit-scrollbar{display:none;}
.sb-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;}
.sb-circle{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
           justify-content:center;font-size:14px;font-weight:700;transition:all .2s;}
.sb-label{font-size:12px;white-space:nowrap;font-weight:600;}
.sb-line{height:2.5px;width:24px;flex-shrink:0;border-radius:2px;transition:background .2s;}

/* ═══ CARDS ═══ */
.card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);
      overflow:hidden;box-shadow:var(--shadow);}
.card+.card,.card+.info-box,.info-box+.card{margin-top:12px;}
.card-head{padding:16px 18px;border-bottom:1px solid var(--border);}
.card-body{padding:16px 18px;}
.card-title{font-size:17px;font-weight:700;color:var(--text);line-height:1.3;}
.card-sub{font-size:13.5px;color:var(--text2);margin-top:3px;}

/* ═══ INFO BOX ═══ */
.info-box{background:var(--blue-l);border:1px solid #bfdbfe;border-radius:var(--radius);
          padding:14px 16px;font-size:14px;color:#1e3a8a;line-height:1.7;}
.warn-box{background:var(--yellow-l);border:1px solid #fde68a;border-radius:var(--radius);
          padding:12px 16px;font-size:14px;color:#713f12;line-height:1.7;}
.nhi-box{background:var(--yellow-l);border-left:4px solid var(--yellow);border-radius:var(--radius-sm);
         padding:12px 16px;font-size:14px;color:#713f12;line-height:1.7;margin-top:10px;}

/* ═══ BUTTONS ═══ */
.btn-primary{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:16px;border-radius:var(--radius);
  background:var(--blue);color:#fff;font-size:16px;font-weight:700;
  box-shadow:var(--shadow);transition:opacity .15s;letter-spacing:.01em;
}
.btn-primary:active{opacity:.85;}
.btn-outline{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;padding:14px;border-radius:var(--radius);
  background:var(--bg2);color:var(--text2);font-size:15px;font-weight:600;
  border:2px solid var(--border2);transition:all .15s;
}
.btn-outline:hover{border-color:var(--blue);color:var(--blue);}

/* ═══ SEL BTN ═══ */
.sel-btn{
  width:100%;display:flex;align-items:flex-start;gap:12px;
  padding:15px 16px;border-radius:var(--radius);
  border:2px solid var(--border);background:var(--bg2);
  margin-bottom:10px;text-align:left;transition:all .15s;
  box-shadow:var(--shadow);
}
.sel-btn.active{border-color:var(--blue);background:var(--blue-l);}
.sel-btn-code{font-family:var(--mono);font-size:13px;font-weight:700;
              padding:4px 10px;border-radius:7px;white-space:nowrap;
              flex-shrink:0;align-self:flex-start;margin-top:1px;
              background:#f1f5f9;color:var(--text2);}
.sel-btn.active .sel-btn-code{background:#bfdbfe;color:var(--blue-d);}
.sel-btn-text{flex:1;min-width:0;}
.sel-btn-title{font-size:16px;font-weight:700;color:var(--text);line-height:1.35;word-break:break-word;}
.sel-btn.active .sel-btn-title{color:var(--blue-d);}
.sel-btn-desc{font-size:14px;color:var(--text2);margin-top:4px;line-height:1.55;word-break:break-word;}
.sel-btn.active .sel-btn-desc{color:#3b82f6;}
.sel-btn-check{color:var(--blue);font-size:20px;flex-shrink:0;margin-top:1px;}

/* ═══ TYPE BTN (NSCLC/SCLC) ═══ */
.type-row{display:flex;gap:14px;margin-bottom:16px;}
.type-row.col{flex-direction:column;}
.type-btn{
  flex:1;padding:26px 14px;border-radius:var(--radius-lg);
  border:2.5px solid var(--border);background:var(--bg2);
  text-align:center;transition:all .15s;box-shadow:var(--shadow);
}
.type-btn:active{transform:scale(.98);}
.type-btn-ico{font-size:44px;margin-bottom:10px;}
.type-btn-title{font-size:20px;font-weight:800;color:var(--text);}
.type-btn-sub{font-size:14px;color:var(--text2);margin-top:4px;}
@media(max-width:430px){.type-row{flex-direction:column;}}

/* ═══ XLINK BTN ═══ */
.xlink-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:11px 16px;border-radius:var(--radius-sm);
  font-size:15px;font-weight:700;margin-top:8px;margin-right:8px;
  word-break:break-word;white-space:normal;text-align:left;
  transition:all .15s;
}
.xlink-btn:active{opacity:.8;}

/* ═══ PILL / BADGE ═══ */
.pill{display:inline-block;font-size:12px;font-weight:700;
      padding:3px 10px;border-radius:20px;line-height:1.5;white-space:nowrap;}
.badge-src{font-family:var(--mono);font-size:11px;font-weight:700;
           padding:3px 8px;border-radius:6px;display:inline-block;line-height:1.5;}
.badge-nccn{background:#dbeafe;color:#1e40af;}
.badge-cat1{background:#d1fae5;color:#065f46;}
.badge-cat2{background:#fef3c7;color:#713f12;}
.badge-trial{background:#ede9fe;color:#4c1d95;}

/* ═══ SECTION HEAD ═══ */
.sec-head{display:flex;align-items:center;gap:9px;margin:16px 0 10px;}
.sec-head-bar{width:4px;height:20px;border-radius:2px;flex-shrink:0;}
.sec-head-text{font-size:13px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;}

/* ═══ TX ROW ═══ */
.tx-row{padding:13px 0;border-bottom:1px solid var(--border);}
.tx-row:last-child{border-bottom:none;}
.tx-row-top{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;}
.tx-row-drug{font-size:15.5px;font-weight:600;color:var(--text);flex:1;min-width:0;
             line-height:1.5;word-break:break-word;}
.tx-row-badges{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;}
.tx-row-note{font-size:13px;color:var(--text2);margin-top:4px;word-break:break-word;line-height:1.5;}

/* ═══ TNM TABLE ═══ */
.tnm-table{width:100%;border-collapse:collapse;font-size:14px;}
.tnm-table th{background:var(--bg3);color:var(--text2);font-size:12px;font-weight:700;
              text-transform:uppercase;letter-spacing:.04em;padding:10px 12px;
              border-bottom:2px solid var(--border2);text-align:left;}
.tnm-table td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:top;
              line-height:1.6;word-break:break-word;}
.tnm-table tr:hover td{background:var(--bg3);}
.tnm-code-cell{font-family:var(--mono);font-size:13px;font-weight:700;
               white-space:nowrap;width:68px;}
.tnm-table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border);
                box-shadow:var(--shadow);}

/* ═══ STAGE RESULT CARD ═══ */
.stage-result{border-radius:var(--radius);border:2.5px solid;overflow:hidden;margin-top:8px;}
.stage-result-head{padding:16px 18px;}
.stage-tnm-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:5px;}
.stage-tnm-code{font-family:var(--mono);font-size:20px;font-weight:800;letter-spacing:-.3px;}
.stage-badge-large{font-size:17px;font-weight:900;padding:5px 16px;border-radius:10px;
                   white-space:nowrap;flex-shrink:0;font-family:var(--mono);}
.stage-result-body{padding:14px 18px;background:var(--bg2);}

/* ═══ TAB TOGGLE ═══ */
.tab-toggle{display:flex;background:var(--bg3);border-radius:var(--radius-sm);
            padding:4px;margin-bottom:16px;}
.tab-toggle-btn{flex:1;padding:9px;border-radius:7px;font-size:14px;font-weight:700;
                color:var(--text2);transition:all .15s;text-align:center;}
.tab-toggle-btn.active{background:var(--bg2);color:var(--blue);box-shadow:var(--shadow);}

/* ═══ LINK BTN ═══ */
.link-card{display:flex;align-items:center;gap:14px;padding:16px 18px;
           background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
           box-shadow:var(--shadow);margin-bottom:10px;transition:all .15s;text-decoration:none;}
.link-card:hover{border-color:var(--blue);box-shadow:var(--shadow2);}
.link-card-ico{font-size:28px;flex-shrink:0;}
.link-card-title{font-size:16px;font-weight:700;color:var(--text);}
.link-card-sub{font-size:12px;color:var(--text2);margin-top:3px;font-family:var(--mono);}
.link-card-arrow{color:var(--text3);margin-left:auto;flex-shrink:0;font-size:18px;}

/* ═══ ACCORDION ═══ */
.accordion{background:var(--bg2);border:1px solid var(--border);
           border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:10px;}
.accordion-head{display:flex;align-items:center;gap:12px;padding:16px 18px;
                width:100%;text-align:left;transition:background .1s;}
.accordion-head:hover{background:var(--bg3);}
.accordion-ico{font-size:24px;flex-shrink:0;}
.accordion-title{font-size:16px;font-weight:700;color:var(--text);flex:1;min-width:0;word-break:break-word;}
.accordion-sub{font-size:13.5px;color:var(--text2);margin-top:2px;word-break:break-word;}
.accordion-arrow{color:var(--text3);flex-shrink:0;font-size:16px;font-weight:700;}
.accordion-body{padding:0 18px 16px;border-top:1px solid var(--border);}

/* ═══ BM GRID ═══ */
.bm-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:420px){.bm-grid{grid-template-columns:1fr;}}
.bm-card{padding:16px;border-radius:var(--radius);border:2px solid;
         cursor:pointer;text-align:left;transition:all .15s;width:100%;}
.bm-card:hover{transform:translateY(-2px);box-shadow:var(--shadow2);}
.bm-card-title{font-size:16px;font-weight:800;margin-bottom:3px;}
.bm-card-sub{font-size:13px;opacity:.75;word-break:break-word;}
.bm-freq{font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;
         margin-top:10px;display:inline-block;font-family:var(--mono);}

/* ═══ STEP NUM ═══ */
.step-num{width:26px;height:26px;border-radius:50%;background:var(--text2);color:#fff;
          font-size:13px;font-weight:700;display:inline-flex;align-items:center;
          justify-content:center;flex-shrink:0;margin-top:2px;}

/* ═══ DIVIDER ═══ */
.div{height:1px;background:var(--border);margin:14px 0;}

/* ═══ LOADING FALLBACK ═══ */
#app-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
             min-height:100vh;gap:12px;color:var(--text2);font-size:15px;}
#app-loading .ld-ico{font-size:48px;}
</style>
</head>

<script>
/* ── PWA Service Worker ── */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    const sw=`
const CACHE='lung-v3.1';
const ASSETS=[location.href];
self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const rc=res.clone();caches.open(CACHE).then(c=>c.put(e.request,rc));return res;})));});
`;
    const blob=new Blob([sw],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  });
}
</script>

};
const stageCols={IA1:"emerald",IA2:"emerald",IA3:"emerald",IB:"green",IIA:"lime",IIB:"yellow",IIIA:"amber",IIIB:"orange",IIIC:"red",IVA:"red",IVB:"red"};

/* ════════════════════════════════════════
   §1  STAGING DATA — 詳細 TNM 定義
════════════════════════════════════════ */
const TNM_TYPES=[
  {v:"cTNM",desc:"臨床分期（治療前，依影像/切片/身體檢查）"},
  {v:"pTNM",desc:"病理分期（手術切除標本後確認）"},
  {v:"yTNM",desc:"新輔助治療後分期（前綴 y 標示）"},

const T_DATA=[
  {v:"T1a",size:"≤1 cm",
   criteria:"腫瘤最大徑 ≤1 cm",
   detail:"局限於肺實質內，或侵犯臟層胸膜；支氣管鏡下未侵犯葉支氣管近端（即未達主支氣管）",
   note:""},
  {v:"T1b",size:">1–2 cm",

   note:""},

function calcNS(T,N,M){
  if(!T||!N||!M)return null;
  const Ng=N_DATA.find(o=>o.v===N)?.g||N;
  const Mg=M_DATA.find(o=>o.v===M)?.g||M;
  if(Mg==="M1c")return"IVB";
  if(Mg==="M1b"||Mg==="M1a")return"IVA";
  return STAGE_RULES[`${T}-${Ng}`]||null;
}
function calcSCLC(T,N,M){
  if(!T||!N||!M)return null;
  const Mg=M_DATA.find(o=>o.v===M)?.g||M;
  if(Mg!=="M0")return{type:"es",label:"廣泛期 (ES-SCLC)",c:"red",desc:"任何 M1，以全身系統治療為主",txKey:"sclc-es"};
  const early=["T1a","T1b","T1c","T2a","T2b"].includes(T);
  if(early&&N==="N0")return{type:"ls1",label:"局限期 Stage I–IIA",c:"emerald",desc:"T1-2 N0 M0，評估手術可行性",txKey:"sclc-ls1"};
  return{type:"ls2",label:"局限期 Stage IIB–IIIC",c:"blue",desc:"N+ 或 T3-4，同步 cCRT 為主",txKey:"sclc-ls2"};
}

function nsclcTxKey({ns,res,ecog,driver,pdl1}){
  if(ns==="I")return"nsclc-I";
  if(ns==="II")return"nsclc-II";
  if(ns==="IIIA")return res==="yes"?"nsclc-IIIA-res":"nsclc-III-unres";
  if(ns==="IIIB-C")return"nsclc-III-unres";
  if(ns==="IV"){
    if(ecog==="3-4")return"nsclc-IV-ps-poor";
    if(driver==="yes")return"nsclc-IV-driver";
    if(pdl1===">=50")return"nsclc-IV-nd-high";
    if(pdl1==="1-49")return"nsclc-IV-nd-mid";
    if(pdl1==="<1")return"nsclc-IV-nd-low";
  }
  return null;
}
function nsclcStageMeaning(stage){
  const m={IA1:"早期 — 評估手術切除",IA2:"早期 — 評估手術切除",IA3:"早期 — 評估手術切除",IB:"早期 — 手術 ± 輔助治療",IIA:"早期 — 手術 ± 輔助治療",IIB:"早期 — 手術 ＋ 輔助治療",IIIA:"局部晚期 — MDT 評估可切除性",IIIB:"局部晚期不可切除 — cCRT ＋ Durvalumab",IIIC:"局部晚期不可切除 — cCRT ＋ Durvalumab",IVA:"轉移性 — 全身治療（M1b 評估局部消融）",IVB:"轉移性 — 全身治療（多處轉移）"};
  return m[stage]||"";
}
function nsclcSG(stage){if(!stage)return null;if(["IA1","IA2","IA3","IB"].includes(stage))return"I";if(["IIA","IIB"].includes(stage))return"II";if(stage==="IIIA")return"IIIA";if(stage==="IIIB"||stage==="IIIC")return"IIIB-C";if(stage==="IVA"||stage==="IVB")return"IV";return null;}
function txKeyFromStage(stage,type){if(type==="sclc")return null;if(!stage)return null;if(["IA1","IA2","IA3","IB"].includes(stage))return"nsclc-I";if(["IIA","IIB"].includes(stage))return"nsclc-II";if(stage==="IIIA")return"nsclc-IIIA-res";if(stage==="IIIB"||stage==="IIIC")return"nsclc-III-unres";return"nsclc-IV-nd-high";}

function StageCard({T,N,M,type,nav}){

  const Nobj=N_DATA.find(o=>o.v===N),Mobj=M_DATA.find(o=>o.v===M);
  const sg=nsclcSG(stage),tKey=sclc?sclc.txKey:txKeyFromStage(stage,type);
  return<div className="stage-result" style={{borderColor:colors.border}}>
    <div className="stage-result-head" style={{background:colors.bg}}>
      <div className="stage-tnm-row">
        <span className="stage-tnm-code" style={{color:colors.text}}>{T}·{N}·{M}</span>
        <span className="stage-badge-large" style={{background:colors.pill,color:colors.pillT}}>
          {type==="nsclc"?"Stage ":""}{stage||"—"}

      {type==="nsclc"&&stage&&<div style={{fontSize:15.5,fontWeight:600,color:"#1e3a8a",marginBottom:8}}>🔬 {nsclcStageMeaning(stage)}</div>}
      {sclc&&<div style={{marginBottom:8}}><Pill ch={sclc.label} color={sclc.c}/><div style={{fontSize:15,color:"var(--text2)",marginTop:4}}>{sclc.desc}</div></div>}
      {N==="N2b"&&<div className="warn-box" style={{marginBottom:8}}>⚠️ <strong>N2b（多站 N2）：</strong>通常為不可切除，需 MDT 確認可切除性</div>}
      {Nobj&&<div style={{fontSize:14,color:"var(--text2)",marginBottom:3,wordBreak:"break-word"}}><span style={{fontFamily:"var(--mono)",fontWeight:600}}>N：</span>{Nobj.v} — {Nobj.criteria}</div>}
      {Mobj&&Mobj.v!=="M0"&&<div style={{fontSize:14,color:"var(--text2)",marginBottom:3,wordBreak:"break-word"}}><span style={{fontFamily:"var(--mono)",fontWeight:600}}>M：</span>{Mobj.v} — {Mobj.criteria}</div>}
      {nav&&tKey&&<div style={{marginTop:10,paddingTop:10,borderTop:"1px dashed var(--border2)"}}>
        <XBtn label={"前往治療："+(type==="sclc"?(sclc?.label||"SCLC"):"NSCLC Stage "+(sg||stage))} color={type==="nsclc"?"sky":"amber"}
          onClick={()=>nav.toTx({ct:type,ns:sg,sc:sclc?.type})}/>
      </div>}
    </div>
  </div>;
}

/* ─── STAGING MODULE ─── */
function StagingMod({nav,m}){
  const init={ph:"type",tt:null,ct:null,T:null,N:null,M:null};
  const [s,setS]=useState(init),[h,setH]=useState([]);
  const [mode,setMode]=useState("calc"); // "calc" | "ref"
  const go=u=>{setH(x=>[...x,s]);setS(p=>({...p,...u}));};
  const back=()=>{if(!h.length)return;setS(h[h.length-1]);setH(x=>x.slice(0,-1));};
  const reset=()=>{setS(init);setH([]);};
  const P=s.ph;
  return<div className="page-pad">
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:14,gap:8}}>
      <div>
        <div className="page-title">🏷 TNM 分期</div>
        <div className="page-sub">{VI.tnm}</div>
      </div>
      <div className="tab-toggle" style={{marginBottom:0,minWidth:130}}>
        <button className={"tab-toggle-btn"+(mode==="calc"?" active":"")} onClick={()=>setMode("calc")}>計算器</button>
        <button className={"tab-toggle-btn"+(mode==="ref"?" active":"")} onClick={()=>setMode("ref")}>速查表</button>
      </div>
    </div>

    {mode==="ref"&&<TNMTable/>}

    {mode==="calc"&&<>
    {P!=="type"&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
      {h.length>0&&<button className="btn-outline" style={{width:"auto",padding:"8px 12px"}} onClick={back}>← 返回</button>}
      {P!=="type"&&<button className="btn-outline" style={{width:"auto",padding:"8px 12px"}} onClick={reset}>↺ 重設</button>}
    </div>}

    {P==="type"&&<>
      <div style={{fontSize:16,fontWeight:600,color:"var(--text)",marginBottom:10}}>選擇癌症類型</div>
      <TypeRow m={m}>
        <TypeBtn icon="🫁" title="NSCLC" sub="非小細胞肺癌" color="sky" active={false} onClick={()=>go({ph:"tt",ct:"nsclc"})}/>
        <TypeBtn icon="🔵" title="SCLC" sub="小細胞肺癌" color="amber" active={false} onClick={()=>go({ph:"tt",ct:"sclc"})}/>
      </TypeRow>
      <div className="info-box">分期依據 <strong>{VI.tnm}</strong>。支援 cTNM / pTNM / yTNM；N2 亞分類（N2a1 / N2a2 / N2b）；M1c1 / M1c2 細分。</div>
    </>}

    {P==="tt"&&<>
      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
        <Pill ch={s.ct?.toUpperCase()} color={s.ct==="nsclc"?"sky":"amber"}/><span style={{fontSize:16,fontWeight:600}}>選擇分期類型</span>
      </div>
      {TNM_TYPES.map(t=><SelBtn key={t.v} code={t.v} title={t.v} desc={t.desc} active={s.tt===t.v} onClick={()=>go({ph:"T",tt:t.v})} ac={s.ct==="nsclc"?"sky":"amber"}/>)}
    </>}

    {P==="T"&&<>
      <StepBar labels={["T","N","M","結果"]} cur={0}/>
      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
        <Pill ch={s.ct?.toUpperCase()} color={s.ct==="nsclc"?"sky":"amber"}/><Pill ch={s.tt} color="gray" sm/>
        <span style={{fontSize:16,fontWeight:600}}>T — 原發腫瘤</span>
      </div>
      {T_DATA.map(o=><SelBtn key={o.v} code={o.v} title={o.size} desc={o.criteria} active={s.T===o.v} onClick={()=>go({ph:"N",T:o.v})} ac={s.ct==="nsclc"?"sky":"amber"}/>)}
    </>}

    {P==="N"&&<>
      <StepBar labels={["T","N","M","結果"]} cur={1}/>
      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
        <Pill ch={s.T} color={s.ct==="nsclc"?"sky":"amber"}/><span style={{fontSize:16,fontWeight:600}}>N — 區域淋巴結</span>
      </div>
      <div className="info-box" style={{marginBottom:10}}>ℹ️ <strong>IASLC 9th N2 亞分類：</strong>N2a1（skip，預後較佳）/ N2a2（含N1）/ N2b（多站，通常不可切除）</div>
      {N_DATA.map(o=><SelBtn key={o.v} code={o.v} title={o.v} desc={o.criteria} active={s.N===o.v} onClick={()=>go({ph:"M",N:o.v})} ac={s.ct==="nsclc"?"sky":"amber"}/>)}
    </>}

    {P==="M"&&<>
      <StepBar labels={["T","N","M","結果"]} cur={2}/>
      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}>
        <Pill ch={s.T} color={s.ct==="nsclc"?"sky":"amber"}/><Pill ch={s.N} color={s.ct==="nsclc"?"sky":"amber"}/><span style={{fontSize:16,fontWeight:600}}>M — 遠處轉移</span>
      </div>

    </>}

    {P==="result"&&s.T&&s.N&&s.M&&<>

    </>}
    </>}
  </div>;
}

/* ─── TREATMENT MODULE ─── */
const IW={ph:"type",ct:null,ns:null,sc:null,res:null,ecog:null,driver:null,pdl1:null};
function TreatMod({preset,nav,onClear,m}){
  const [w,setW]=useState(IW),[wh,setWh]=useState([]);
  useEffect(()=>{
    if(!preset)return;const{ct,ns,sc}=preset;if(!ct)return;
    let nw={...IW,ct};
    if(sc){nw={...nw,sc,ph:"result"};}
    else if(ns){if(["I","II","IIIB-C"].includes(ns)){nw={...nw,ns,ph:"result"};}else{nw={...nw,ns,ph:ns==="IIIA"?"resectable":"ecog"};}}
    setW(nw);setWh([IW]);if(onClear)onClear();
  },[preset]);
  const go=u=>{setWh(h=>[...h,w]);setW(x=>({...x,...u}));};
  const back=()=>{if(!wh.length)return;setW(wh[wh.length-1]);setWh(h=>h.slice(0,-1));};
  const reset=()=>{setW(IW);setWh([]);};
  const tKey=(()=>{if(w.ph!=="result")return null;if(w.ct==="sclc")return"sclc-"+w.sc;return nsclcTxKey({ns:w.ns,res:w.res,ecog:w.ecog,driver:w.driver,pdl1:w.pdl1});})();
  const wl=(()=>{if(!w.ct)return["癌種"];if(w.ct==="sclc")return["癌種","分期","結果"];const st=["癌種","分期"];if(w.ns==="IIIA"){st.push("切除性");st.push("結果");}else if(w.ns==="IV"){st.push("ECOG");if(w.ecog&&w.ecog!=="3-4"){st.push("Driver");if(w.driver==="no")st.push("PD-L1");}st.push("結果");}else st.push("結果");return st;})();
  return<div className="page-pad">
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
      <div style={{flex:1}}><div className="page-title">💊 治療決策</div><div className="page-sub">{w.ct==="sclc"?VI.sclc:VI.nsclc}</div></div>
      {w.ph!=="type"&&<button className="btn-outline" style={{width:"auto",padding:"8px 12px"}} onClick={reset}>↺</button>}
    </div>
    {w.ph!=="type"&&<StepBar labels={wl} cur={Math.max(0,wl.length-(tKey?1:2))}/>}
    {wh.length>0&&<button className="btn-outline" style={{marginBottom:10}} onClick={back}>← 返回上一步</button>}

    {w.ph==="type"&&<TypeRow m={m}>
      <TypeBtn icon="🫁" title="NSCLC" sub="非小細胞肺癌" color="sky" active={false} onClick={()=>go({ph:"nsclcStage",ct:"nsclc"})}/>
      <TypeBtn icon="🔵" title="SCLC" sub="小細胞肺癌" color="amber" active={false} onClick={()=>go({ph:"sclcStage",ct:"sclc"})}/>
    </TypeRow>}

    {w.ph==="nsclcStage"&&<>
      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}><Pill ch="NSCLC" color="sky"/><span style={{fontSize:16,fontWeight:600}}>選擇分期</span></div>
      {[{v:"I",t:"Stage I",d:"T1-2 N0 M0 — 早期"},{v:"II",t:"Stage II",d:"T3N0 / T1-2N1 — 早期"},{v:"IIIA",t:"Stage IIIA",d:"T3-4N1 / T1-3N2 — 局部晚期"},{v:"IIIB-C",t:"Stage IIIB/C",d:"T3-4N3 — 局部晚期（通常不可切除）"},{v:"IV",t:"Stage IV",d:"M1 — 轉移性"}].map(s=><SelBtn key={s.v} title={s.t} desc={s.d} active={w.ns===s.v} ac="sky" onClick={()=>{if(["I","II","IIIB-C"].includes(s.v))go({ph:"result",ns:s.v});else go({ph:s.v==="IIIA"?"resectable":"ecog",ns:s.v});}}/>)}
    </>}
    {w.ph==="sclcStage"&&<>
      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:10,flexWrap:"wrap"}}><Pill ch="SCLC" color="amber"/><span style={{fontSize:16,fontWeight:600}}>選擇分期</span></div>
      {[{v:"ls1",t:"局限期 Stage I–IIA",d:"T1-2 N0 M0 — 評估手術"},{v:"ls2",t:"局限期 Stage IIB–IIIC",d:"N+ 或 T3-4 — 同步 cCRT"},{v:"es",t:"廣泛期 (ES-SCLC)",d:"任何 M1 — 全身治療"}].map(s=><SelBtn key={s.v} title={s.t} desc={s.d} active={w.sc===s.v} onClick={()=>go({ph:"result",sc:s.v})} ac="amber"/>)}
    </>}
    {w.ph==="resectable"&&<>
      <div style={{marginBottom:12}}><Pill ch="NSCLC Stage IIIA" color="sky"/><div style={{fontSize:16,fontWeight:600,marginTop:10}}>可切除性評估（MDT 討論）</div></div>
      <SelBtn title="✅ 可切除 Resectable" desc="MDT 評估可達 R0 切除（含降期後手術）" active={w.res==="yes"} onClick={()=>go({ph:"result",res:"yes"})} ac="emerald"/>
      <SelBtn title="❌ 不可切除 Unresectable" desc="侵犯大血管/心臟/氣管；N3；或 MDT 評估無法 R0" active={w.res==="no"} onClick={()=>go({ph:"result",res:"no"})} ac="red"/>
    </>}
    {w.ph==="ecog"&&<>
      <div style={{marginBottom:12}}><Pill ch="NSCLC Stage IV" color="sky"/><div style={{fontSize:16,fontWeight:600,marginTop:10}}>體能狀態 ECOG PS</div></div>
      <SelBtn title="ECOG 0–1" desc="良好 — 可耐受標準化療/ICI 全劑量" active={w.ecog==="0-1"} onClick={()=>go({ph:"driver",ecog:"0-1"})} ac="emerald"/>
      <SelBtn title="ECOG 2" desc="中等 — 建議 Carboplatin-based；單藥考量" active={w.ecog==="2"} onClick={()=>go({ph:"driver",ecog:"2"})} ac="amber"/>
      <SelBtn title="ECOG 3–4" desc="差 — BSC 為主；若有 Driver TKI 仍可考慮" active={w.ecog==="3-4"} onClick={()=>go({ph:"result",ecog:"3-4"})} ac="red"/>
    </>}
    {w.ph==="driver"&&<>
      <div style={{marginBottom:12}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginBottom:8}}><Pill ch="NSCLC IV" color="sky"/><Pill ch={"ECOG "+w.ecog} color={w.ecog==="2"?"amber":"emerald"} sm/></div>
        <div style={{fontSize:16,fontWeight:600}}>Targetable Driver Mutation？</div>
        <div style={{fontSize:14,color:"var(--text2)",marginTop:3}}>EGFR / ALK / ROS1 / BRAF / KRAS G12C / MET ex14 / RET / NTRK / HER2</div>
      </div>
      <SelBtn title="✅ 有 Driver Mutation" desc="任一 targetable 突變確認陽性" active={w.driver==="yes"} onClick={()=>go({ph:"result",driver:"yes"})} ac="emerald"/>
      <SelBtn title="❌ 無 Driver Mutation（或尚未檢測）" desc="依 PD-L1 TPS 決策" active={w.driver==="no"} onClick={()=>go({ph:"pdl1",driver:"no"})} ac="sky"/>
    </>}
    {w.ph==="pdl1"&&<>
      <div style={{marginBottom:12}}>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center",marginBottom:8}}><Pill ch="NSCLC IV" color="sky"/><Pill ch="無 Driver" color="gray" sm/></div>
        <div style={{fontSize:16,fontWeight:600}}>PD-L1 TPS（22C3 抗體）</div>
      </div>
      <SelBtn code="≥50%" title="TPS ≥50% — 高表現" desc="ICI 單藥（Pembrolizumab）為 Cat.1 選項" active={w.pdl1===">=50"} onClick={()=>go({ph:"result",pdl1:">=50"})} ac="emerald"/>
      <SelBtn code="1–49%" title="TPS 1–49% — 中等" desc="ICI 單藥不建議；需與化療併用" active={w.pdl1==="1-49"} onClick={()=>go({ph:"result",pdl1:"1-49"})} ac="amber"/>
      <SelBtn code="<1%" title="TPS <1% — 陰性" desc="ICI 單藥無效（Cat.3）；化療+ICI 仍有效" active={w.pdl1==="<1"} onClick={()=>go({ph:"result",pdl1:"<1"})} ac="orange"/>
      <SelBtn title="未知 / 尚未檢測" desc="建議儘速送檢；暫以化療+ICI 方向" active={w.pdl1==="unknown"} onClick={()=>go({ph:"result",pdl1:"unknown"})} ac="gray"/>
    </>}
    {w.ph==="result"&&<>
      {tKey?<TxCard data={TX[tKey]||null} nav={nav}/>:<div className="warn-box">⚠️ 請先完成 PD-L1 檢測後重新確認治療方案。</div>}
      <button className="btn-outline" style={{marginTop:10}} onClick={reset}>↺ 重新選擇</button>
    </>}
  </div>;
}

/* ─── BIOMARKER MODULE ─── */
function BMMod({presetId,nav,onClear}){
  const [sel,setSel]=useState(null);
  useEffect(()=>{if(presetId){setSel(presetId);if(onClear)onClear();};},[presetId]);
  const b=BM.find(x=>x.id===sel);
  return<div className="page-pad">
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
      {sel&&<button className="btn-outline" style={{width:"auto",padding:"8px 12px"}} onClick={()=>setSel(null)}>← 返回</button>}
      <div><div className="page-title">🧬 生物標記</div><div className="page-sub">NSCLC · {VI.nsclc}</div></div>
    </div>
    {!sel&&<div className="bm-grid">
      {BM.map(x=>{const col=COL[x.c]||COL.gray;return<button key={x.id} className="bm-card" onClick={()=>setSel(x.id)} style={{borderColor:col.border,background:col.bg}}>
        <div className="bm-card-title" style={{color:col.text}}>{x.l}</div>
        <div className="bm-card-sub" style={{color:col.text}}>{x.sub}</div>
        <div className="bm-freq" style={{background:col.pill,color:col.pillT}}>{x.freq}</div>
      </button>;})}
    </div>}
    {sel&&b&&<div>
      <div className="card" style={{marginBottom:10}}>
        <div className="card-head" style={{background:COL[b.c]?.bg,borderBottom:`1px solid ${COL[b.c]?.border}`}}>
          <div style={{display:"flex",gap:8,alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap"}}>
            <div><div style={{fontSize:20,fontWeight:800,color:COL[b.c]?.text}}>{b.l}</div><div style={{fontSize:14,color:COL[b.c]?.text,opacity:.75,marginTop:2}}>{b.sub}</div></div>
            <div style={{textAlign:"right",flexShrink:0}}><Pill ch={b.freq} color={b.c}/><div style={{fontSize:13,color:COL[b.c]?.text,opacity:.7,marginTop:4,fontFamily:"var(--mono)"}}>🧪 {b.test}</div></div>
          </div>
          {b.mut.length>0&&<div style={{marginTop:8,display:"flex",gap:4,flexWrap:"wrap"}}>
            {b.mut.map((m2,i)=><span key={i} style={{fontSize:13,background:"rgba(255,255,255,.6)",color:COL[b.c]?.text,padding:"2px 8px",borderRadius:20,border:`1px solid ${COL[b.c]?.border}`}}>{m2}</span>)}
          </div>}
        </div>
        <div className="card-body">
          <SecHead ch="一線優先治療" color="emerald" icon="⭐"/>
          {b.first.map((r,i)=><TxRow key={i} d={r.d} trial={r.trial} cat={r.cat} n={r.n}/>)}
          {b.other.length>0&&<><SecHead ch="其他推薦 / 後線" color="blue" icon="✔"/>{b.other.map((r,i)=><TxRow key={i} d={r.d} trial={r.trial} cat={r.cat} n={r.n}/>)}</>}
        </div>
      </div>
      <div className="card" style={{marginBottom:10}}>
        <div className="card-body">
          <SecHead ch="CNS 穿透 / 腦轉移" color="sky" icon="🧠"/>
          <div style={{fontSize:15,color:"var(--text)",lineHeight:1.6}}>{b.cns}</div>
          <SecHead ch="抗藥性備註" color="orange" icon="🔄"/>
          {b.res.map((r,i)=><div key={i} style={{display:"flex",gap:8,marginBottom:6,alignItems:"flex-start"}}>
            <span style={{color:"var(--orange)",fontSize:15,marginTop:1,flexShrink:0}}>•</span>
            <span style={{fontSize:15,color:"var(--text)",lineHeight:1.55,wordBreak:"break-word"}}>{r}</span>
          </div>)}
        </div>
      </div>
      {nav&&b.txLink&&<XBtn label={"前往治療："+(TX[b.txLink]?.title||b.txLink)} color="sky" onClick={()=>nav.toTx({ct:"nsclc",ns:b.txLink.includes("IV")?"IV":"I"})}/>}
    </div>}
  </div>;
}

/* ─── SPECIAL MODULE ─── */
function SpecialMod({nav}){
  const [exp,setExp]=useState(null);
  return<div className="page-pad">
    <div className="page-title" style={{marginBottom:4}}>⚡ 特殊臨床情境</div>
    <div className="page-sub" style={{marginBottom:14}}>NCCN 2026 · 情境化決策</div>
    {SC.map(sc=>{const open=exp===sc.id;return<div key={sc.id} className="accordion">
      <button className="accordion-head" onClick={()=>setExp(open?null:sc.id)}>
        <span className="accordion-ico">{sc.i}</span>
        <div style={{flex:1,minWidth:0}}>
          <div className="accordion-title">{sc.t}</div>
          <div className="accordion-sub">{sc.s}</div>
        </div>
        <span className="accordion-arrow">{open?"▲":"▼"}</span>
      </button>
      {open&&<div className="accordion-body">
        <div style={{paddingTop:10}}>
          {sc.body.map((b,i)=><div key={i} style={{display:"flex",gap:8,marginBottom:9,alignItems:"flex-start"}}>
            <span className="step-num">{i+1}</span>
            <span style={{fontSize:15.5,color:"var(--text)",lineHeight:1.6,wordBreak:"break-word"}}>{b}</span>
          </div>)}
        </div>
        <div style={{marginTop:10,padding:"8px 12px",background:"var(--bg3)",borderRadius:8,fontSize:14,color:"var(--text2)"}}>
          📚 {sc.ref}
        </div>
        {nav&&sc.txKey&&<div style={{marginTop:8}}>
          <XBtn label={"前往治療："+(TX[sc.txKey]?.title||sc.txKey)} color="sky"
            onClick={()=>{const isSC=sc.txKey.startsWith("sclc-");nav.toTx({ct:isSC?"sclc":"nsclc",sc:isSC?sc.txKey.replace("sclc-",""):null,ns:!isSC?(sc.txKey.includes("III")?"IIIA":sc.txKey.includes("IV")?"IV":null):null});}}/>
        </div>}
      </div>}
    </div>;})}
  </div>;
}

/* ─── REFERENCE MODULE ─── */
function RefMod(){
  return<div className="page-pad">
    <div className="page-title" style={{marginBottom:4}}>📚 文獻來源</div>
    <div className="page-sub" style={{marginBottom:14}}>指引版本 · 原文連結 · 關鍵試驗</div>

    {/* NCCN 原文連結 */}
    <div style={{marginBottom:12}}>
      <div style={{fontSize:14,fontWeight:700,color:"var(--text2)",marginBottom:6,textTransform:"uppercase",letterSpacing:".04em"}}>📄 NCCN 原文 PDF</div>
      <a href={VI.nsclcUrl} target="_blank" rel="noopener" className="link-card">
        <span className="link-card-ico">🫁</span>
        <div><div className="link-card-title">NSCLC Guidelines</div><div className="link-card-sub">{VI.nsclc} · {VI.nsclcDate}</div></div>
        <span className="link-card-arrow">↗</span>
      </a>
      <a href={VI.sclcUrl} target="_blank" rel="noopener" className="link-card">
        <span className="link-card-ico">🔵</span>
        <div><div className="link-card-title">SCLC Guidelines</div><div className="link-card-sub">{VI.sclc} · {VI.sclcDate}</div></div>
        <span className="link-card-arrow">↗</span>
      </a>
    </div>

    {/* 版本資訊 */}
    <div className="card" style={{marginBottom:12}}>
      <div className="card-head"><div className="card-title">版本資訊</div></div>
      <div className="card-body">
        {[{l:"NCCN SCLC",v:VI.sclc+" ("+VI.sclcDate+")",c:"amber"},{l:"NCCN NSCLC",v:VI.nsclc+" ("+VI.nsclcDate+")",c:"sky"},{l:"TNM 分期",v:VI.tnm,c:"indigo"},{l:"App 版本",v:VI.app+" · "+VI.appDate,c:"gray"}].map((r,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:i<3?"1px solid var(--border)":"none",gap:8,flexWrap:"wrap"}}>
          <span style={{fontSize:15.5,fontWeight:600}}>{r.l}</span><Pill ch={r.v} color={r.c} sm/>
        </div>)}
      </div>
    </div>

    {/* 關鍵試驗 */}
    <div className="card" style={{marginBottom:12}}>
      <div className="card-head"><div className="card-title">🔬 關鍵臨床試驗</div></div>
      <div className="card-body">
        {KT.map((t,i)=><div key={i} style={{paddingBottom:10,marginBottom:10,borderBottom:i<KT.length-1?"1px solid var(--border)":"none"}}>
          <div style={{fontSize:15.5,fontWeight:700}}>{t.n}</div>
          <div style={{fontSize:14.5,color:"var(--text)",marginTop:2}}>{t.d}</div>
          <div style={{fontSize:13.5,color:"var(--text2)",marginTop:1,fontFamily:"var(--mono)"}}>{t.r}</div>
        </div>)}
      </div>
    </div>

    {/* Disclaimer */}
    <div className="warn-box">
      <strong>⚠️ 免責聲明</strong><br/>
      本工具依據 NCCN Guidelines 整理，<strong>僅供醫療專業人員快速參考</strong>，不取代個別臨床判斷。
      所有治療決策需結合個別患者臨床狀況、偏好，並以<strong>最新版指引及 MDT 討論</strong>為準。
      肺癌治療更新迅速，請定期確認指引版本。
    </div>
  </div>;
}

/* ════════════════════════════════════════
   §10  APP SHELL
════════════════════════════════════════ */
const TABS=[{id:"staging",ic:"🏷️",lb:"分期"},{id:"treatment",ic:"💊",lb:"治療"},{id:"biomarker",ic:"🧬",lb:"標記"},{id:"special",ic:"⚡",lb:"情境"},{id:"reference",ic:"📚",lb:"文獻"}];

function App(){
  const [tab,setTab]=useState("staging"),[preset,setPreset]=useState({});
  const ww=useW(),m=ww<=430;

  const nav={
    toTx:p=>{setPreset(x=>({...x,treatment:p}));setTab("treatment");},
    toBm:id=>{setPreset(x=>({...x,bmId:id}));setTab("biomarker");},
    toStaging:()=>setTab("staging"),
  };

  return<div className="app-wrap">
    {/* Header */}
    <div className="app-header">
      <div className="header-row1">
        <div className="header-title">🫁 肺癌診治指引</div>
        <span className="header-badge">NCCN 2026</span>
      </div>
      <div className="header-row2">Lung Cancer Decision Support · {VI.app} · {VI.appDate}</div>
    </div>

    {/* Content */}
    <div className="app-content">
      {tab==="staging"  &&<StagingMod  nav={nav} m={m}/>}
      {tab==="treatment"&&<TreatMod    preset={preset.treatment} nav={nav} m={m} onClear={()=>setPreset(x=>({...x,treatment:undefined}))}/>}
      {tab==="biomarker"&&<BMMod       presetId={preset.bmId} nav={nav} onClear={()=>setPreset(x=>({...x,bmId:undefined}))}/>}
      {tab==="special"  &&<SpecialMod  nav={nav}/>}
      {tab==="reference"&&<RefMod/>}
    </div>

    {/* Tab Bar */}
    <div className="tab-bar">
      {TABS.map(t=>{const on=tab===t.id;return<button key={t.id} onClick={()=>setTab(t.id)} className="tab-btn">
        {on&&<div className="tab-indicator"/>}
        <span className="tab-ico">{t.ic}</span>
        <span className={"tab-lbl"+(on?" on":"")}>{t.lb}</span>
      </button>;})}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
